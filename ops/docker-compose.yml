# docker-compose
services:
  db:
    image: mysql:8.0.36
    environment:
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      TZ: UTC
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - dbdata:/var/lib/mysql

# -- SONAR (desactivado durante test provisionales para disminuir carga --
#  sonarqube:
#   image: sonarqube:10.6-community
#    environment:
#      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
#    ports:
#      - "9000:9000"
#    volumes:
#      - sonar_data:/opt/sonarqube/data
#      - sonar_extensions:/opt/sonarqube/extensions

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PY2_BASE_URL: http://py2:5000
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/appdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s # Deja 60 segundos al arranque para la configuración
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      SERVER_PORT: 8081
      BACKEND_BASE_URL: http://backend:8080
      # TEST :
      JAVA_TOOL_OPTIONS: "-Djava.security.egd=file:/dev/./urandom"
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s # Deja 60 segundos al arranque para la configuración
    ports:
      - "8081:8081"

  py1:
    build:
      context: ../py1
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health').read(); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  py2:
    build:
      context: ../py2
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5002:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health').read(); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      py1:
        condition: service_started
      py2:
        condition: service_started
    ports:
      - "80:80"

volumes:
  dbdata:
  sonar_data:
  sonar_extensions: