# Orchestration Docker Compose - Sistema Multi-módulo (Java, Python, MySQL, Nginx)
# Este archivo define la red y el ciclo de vida de los 7 contenedores del proyecto.

services:

  # 1. BASE DE DATOS: Motor MySQL 8.0 compartido por todos los servicios
  db:
    image: mysql:8.0.36
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3306:3306"
    # Healthcheck vital: impide que los demás servicios arranquen antes de que MySQL acepte conexiones
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER --password=$$MYSQL_PASSWORD --silent" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - dbdata:/var/lib/mysql

  # 2. CALIDAD DE CÓDIGO: Servidor SonarQube para análisis estático
  sonarqube:
    image: sonarqube:10.6-community
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions

  # 3. BACKEND JAVA: Procesa la lógica de negocio principal
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PY2_BASE_URL: http://py2:5000
      SPRING_THYMELEAF_CACHE: true
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy # Solo arranca cuando la DB está lista
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    ports:
      - "8080:8080"

  # 4. FRONTEND JAVA: Interfaz de usuario (Thymeleaf/Spring Boot)
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      SPRING_THYMELEAF_CACHE: true
      SERVER_PORT: 8081
      BACKEND_BASE_URL: http://backend:8080
      JAVA_TOOL_OPTIONS: "-Djava.security.egd=file:/dev/./urandom" # Mejora el arranque en Linux/Docker
      SPRING_JPA_OPEN_IN_VIEW: "false"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    ports:
      - "8081:8081"

  # 5. MICROSERVICIO PY1: Gestión de Pokémon (Python Flask)
  py1:
    build:
      context: ..
      dockerfile: py1/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DB_HOST: ${PY_DB_HOST}
      DB_PORT: ${PY_DB_PORT}
      DB_NAME: ${PY_DB_NAME}
      DB_USER: ${PY_DB_USER}
      DB_PASSWORD: ${PY_DB_PASSWORD}
    ports:
      - "5001:5000"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health').read(); sys.exit(0)" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 6. MICROSERVICIO PY2: Gestión de Items y saludo (Python Flask)
  py2:
    build:
      context: ..
      dockerfile: py2/Dockerfile
    environment:
      FLASK_ENV: production
      DB_HOST: ${PY_DB_HOST}
      DB_PORT: ${PY_DB_PORT}
      DB_NAME: ${PY_DB_NAME}
      DB_USER: ${PY_DB_USER}
      DB_PASSWORD: ${PY_DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5002:5000"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health').read(); sys.exit(0)" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 7. WEBSOCKET-SERVER: Módulo WebSocket STOMP + colas offline
  websocket-server:
    build:
      context: ..
      dockerfile: websocket-server/Dockerfile
    environment:
      SPRING_THYMELEAF_CACHE: true # Consistencia entre módulos JAVA
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      WS_SERVER_PORT: 8090
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s


  # 8. PROXY REVERSO: Nginx como puerta de enlace única
  nginx:
    image: nginx:1.27
    container_name: nginx_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      py1:
        condition: service_started
      py2:
        condition: service_started
    ports:
      - "80:80" # Punto de acceso para el usuario final
    restart: always # si Nginx falla por un timeout de red, se reinicia solo


# PERSISTENCIA: Definición de volúmenes para que los datos no se pierdan al reiniciar
volumes:
  dbdata:           # Datos de MySQL
  sonar_data:       # Datos de SonarQube
  sonar_extensions: # Extensiones/Plugins de Sonar
