events {}
http {
  server {
    server_tokens off;
    listen 80;

    location / { proxy_pass http://frontend:8081/; }

    location /api/ {
      proxy_pass http://backend:8080/;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 30s;
    }

    location /py1/ { proxy_pass http://py1:5000/; proxy_read_timeout 30s; }
    location /py2/ { proxy_pass http://py2:5000/; proxy_read_timeout 30s; }
  }
}