worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;

    # Definición de los grupos de servidores (Nombres del docker-compose)
    upstream frontend_srv { server frontend:8081; }
    upstream backend_srv  { server backend:8080; }
    upstream py1_srv       { server py1:5000; }
    upstream py2_srv       { server py2:5000; }
    upstream websocket_srv { server websocket-server:8090; }

    server {
        listen 80;

        # Cabeceras estándar para que los microservicios reconozcan la IP original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. FRONTEND (Thymeleaf) - Ruta raíz
        location / {
            proxy_pass http://frontend_srv;
        }

        # 2. BACKEND (Spring Boot API)
        # Nota: Sin la barra final para evitar reescrituras de path inesperadas
        location /backend {
            proxy_pass http://backend_srv;
        }

        # 3. PY1 (Pokémon API)
        location /api2 {
            proxy_pass http://py1_srv;
        }

        # 4. PY2 (Items API)
        location /api3 {
            proxy_pass http://py2_srv;
        }

        # 5. WEBSOCKET-SERVER (WebSocket + API)

        # WebSocket puro (/ws)
        location /ws {
            proxy_pass http://websocket_srv; #proxy_pass http://websocket-server:8090/ws;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;

            # CABECERAS CORS PARA NGINX
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Content-Range,Range' always;

            proxy_read_timeout 3600;
        }

        location /ws-login {
            proxy_pass http://websocket-server:8090/ws-login;
            proxy_set_header Host $host;
        }

        location /ws-register {
            proxy_pass http://websocket-server:8090/ws-register;
            proxy_set_header Host $host;
        }

        # API REST del websocket-server
        location /api/ {
            proxy_pass http://websocket-server:8090;
            proxy_set_header Host $host;
        }

    }
}
