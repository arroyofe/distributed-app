<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Items</title>
</head>

<body>
<div layout:fragment="content">
    <!-- Título de la página que se verá en el header -->
    <span th:with="pageName='Items-edit'"></span>

    <h2 th:text="'Modificar el item #' + ${item.id}">Modificar el item</h2>

    <form th:action="@{'/admin/items/edit/' + ${item.id}}"
          method="post" class="form-card">
        <!-- El input escondido permite la gestión de la seguridad -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <label for="nameInput">Nombre :</label>
        <input type="text" id="nameInput" name="name" class="input"
               th:value="${item.name}" required>

        <label for="descInput">Descripción :</label>
        <textarea id="descInput" name="description" class="input"
                  th:text="${item.description}"></textarea>

        <button type="submit" class="btn btn-warning" style="margin-top:15px;">
           Actualizar
        </button>
    </form>

    <div style="margin-top:20px;">
        <a th:href="@{/items}" class="btn btn-secondary">← Volver</a>
    </div>

</div>
</body>
</html>
