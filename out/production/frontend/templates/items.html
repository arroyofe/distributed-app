<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<div layout:fragment="content">
    <!-- Título de la página que se verá en el header -->
    <span th:with="pageName='Items'"></span>

    <h2 th:text="${pageName} ?: 'Liste des items'"></h2>

    <!-- BTN Añadir (visible solamente por ADMIN) -->
    <div style="text-align:right; margin-bottom:15px;">
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/items/new}"
           class="btn btn-primary">
            + Añadir un item
        </a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th sec:authorize="hasRole('ADMIN')" style="width:150px;">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="it : ${items}">
            <td th:text="${it.id}"></td>
            <td th:text="${it.name}"></td>
            <td th:text="${it.description}"></td>

            <!-- Acciones visibles solamente por ADMIN -->
            <td sec:authorize="hasRole('ADMIN')" style="text-align:right;">
                <a th:href="@{'/admin/items/edit/' + ${it.id}}"
                   class="btn btn-warning btn-small">
                    Modificar
                </a>

                <form th:action="@{'/admin/items/delete/' + ${it.id}}"
                      method="post" style="display:inline;">
                    <!-- El input escondido permite la gestión de la seguridad -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <button type="submit"
                            onclick="return confirm('¿Suprimir este item ?');"
                            class="btn btn-danger btn-small">
                        Suprimir
                    </button>
                </form>
            </td>

        </tr>
        </tbody>

    </table>

</div>
</body>
</html>
