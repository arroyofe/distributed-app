<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz"
      xmlns:sec="http://www.thymeleaf.org"
      layout:decorate="~{layout}">


<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title th:text="${pageTitle} ?: 'UBU - EPI - Sistemas Distribuidos'"></title>
</head>

<body>

<header class="header">
  <!-- Contenido del header: escudo de la UBU a la izquierda-->
  <div class="header-left">
    <img th:src="@{/images/escudo.png}" alt="Logo UBU" class="logo">
  </div>
  <!-- Título en el centro -->
  <div class="header-center">
    <h1 class="site-title">Práctica 2 de Sistemas Distribuidos EPI - UBU</h1>
  </div>
  <!-- Nombre de la página a la derecha  y del usuario si está conectado-->
  <div class="header-right">
    <!-- 1. Página actual (se ve siempre) -->
    <div style="margin-bottom: 5px;">
      <span th:text="${pageName} ?: ''" style="font-weight: bold;"></span>
    </div>

    <!-- 2. Bloque usuario (Se ve solamente si hay alguien conectado) -->
    <div sec:authorize="isAuthenticated()" style="font-size: 0.85em; border-top: 1px solid #ccc; padding-top: 5px;">
      <span>👤 <strong sec:authentication="name">Utilisateur</strong></span>
      <br>
      <!-- Limpieza del header para evita los [ ] -->
      <small>Rôle : <span th:text="${#strings.replace(#authentication.authorities[0], 'ROLE_', '')}"></span></small>
      <br>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" style="background:none; border:none; color:#d9534f; cursor:pointer; text-decoration:underline; padding:0;">Déconnexion</button>
      </form>
    </div>

    <!-- 3. Enlace de conexión si no se ha conectado nadie -->
    <div sec:authorize="isAnonymous()">
      <a th:href="@{/login}" style="font-size: 0.9em;">Se connecter</a>
    </div>
  </div>


</header>

<!-- Zono destinada ser cambiada en cada pógina segón contenido -->
<main class="content" layout:fragment="content">
  <!-- NO SE INSERTA cádigo aquí reservado al contenido de la página -->
</main>

<footer class="footer">
  <!-- Contenido del footer a poner en todas las páginas -->
  <div class="footer-left">
    <strong>Contacto :</strong><br>
    <span>Fernando Arroyo</span><br>
    <span>far0006@alu.ubu.es</span><br>
    <span>Universidad de Burgos</span>
  </div>

  <div class="footer-center">
    <span th:text="${#dates.format(#dates.createNow(),'dd/MM/yyyy')}"></span>
  </div>

  <div class="footer-right">
    <a th:href="@{/}">Volver al inicio</a>
  </div>

</footer>

</body>
</html>
