<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <!-- Título para la conexión -->
    <title>Página de Conexión</title>
</head>

<body>

<div layout:fragment="content" class="login-container">

    <!-- Título de la página -->
    <div th:replace="~{this :: #pageTitleSetter}"></div>
    <span id="pageTitleSetter" th:with="pageName='Connexion'" style="display:none;"></span>

    <div style="max-width:400px; margin:60px auto; padding:30px; border-radius:12px;
                background:#ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">

        <h2 style="color:#003366; text-align:center; margin-bottom:25px;">Identification</h2>

        <!-- Mensaje de ERROR si ee login no funciona -->
        <div th:if="${param.error}"
             style="background:#f8d7da; color:#721c24; padding:10px; border-radius:5px; margin-bottom:20px; font-size:0.9em; text-align:center;">
            Nombre de usuario y/o contraseña incorrectos.
        </div>

        <!-- Mensaje de LOGOUT bien acabado -->
        <div th:if="${param.logout}"
             style="background:#d4edda; color:#155724; padding:10px; border-radius:5px; margin-bottom:20px; font-size:0.9em; text-align:center;">
            Se ha desconectado correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom:15px; text-align:left;">
                <label style="font-weight:bold; color:#555;" for="usernameInput">Utilisateur :</label>
                <input type="text" id="usernameInput" name="username" required autofocus
                       style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-top:5px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom:25px; text-align:left;">
                <label style="font-weight:bold; color:#555;" for="passwInput">Mot de passe :</label>
                <input type="password" id="passwInput" name="password" required
                       style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-top:5px; box-sizing: border-box;">
            </div>

            <!-- Token CSRF (no es necesario en principio pero se indica por sécuridad) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <button type="submit"
                    style="width:100%; padding:12px; background:#003366; color:white;
                           border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; transition: background 0.3s;">
                Conectarse
            </button>
        </form>

        <div style="margin-top:20px; font-size:0.85em; color:#777;">
            <p>Aceso reservado a los administradores para la gestión de datos de la base.</p>
        </div>
    </div>
</div>

</body>
</html>
