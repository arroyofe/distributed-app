<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"><title>API 2</title></head>
<body>
<h1>Respuesta de Py2 via Backend</h1>
<div th:if="${result}">
    <pre th:text="${#temporals.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></pre>
    <pre th:text="${result}"></pre>
</div>
<div th:if="${error}">
    <strong>Erreur:</strong>
    <pre th:text="${error}"></pre>
</div>
</body>
</html>
