<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Items nuevo elemento</title>
</head>

<body>
<div layout:fragment="content">
    <!-- Título de la página que se verá en el header -->
    <span th:with="pageName='Items-new'"></span>

    <h2>Crear un item nuevo</h2>

    <form th:action="@{/admin/items/new}" method="post" class="form-card">
        <!-- El input escondido permite la gestión de la seguridad -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <label for="nameInput">Nombre :</label>
        <input type="text" id="nameInput" name="name" class="input" required>

        <label for="descripInput" >Descripción :</label>
        <textarea id="descripInput" name="description" class="input"></textarea>

        <button type="submit" class="btn btn-primary" style="margin-top:15px;">
            Crear
        </button>
    </form>

    <div style="margin-top:20px;">
        <a th:href="@{/items}" class="btn btn-secondary">← Volver</a>
    </div>

</div>
</body>
</html>
