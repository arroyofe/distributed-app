spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/appdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
    username: root
    password: rootpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8081}

app:
  backendBaseUrl: ${BACKEND_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
