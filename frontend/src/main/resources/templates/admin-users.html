<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout">
<body>

<div th:fragment="content">
    <!-- Título de la página que se verá en el header -->
    <span th:with="pageName='Admin-users'"></span>

    <h1>Lista de usuarios</h1>

    <a href="/admin/users/new" class="btn btn-primary">Créer un utilisateur</a>

    <table class="table mt-4">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td>
                <form th:action="@{'/admin/users/delete/' + ${u.id}}" method="post">
                    <button class="btn btn-danger btn-sm">Suprimir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
