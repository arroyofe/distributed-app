<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<div th:replace="~{this :: #pageTitleSetter}"></div>
<span id="pageTitleSetter" th:with="pageName='NOM_DE_LA_PAGE'" style="display:none;"></span>
<div layout:fragment="content">

    <h2>Crear un item nuevo</h2>

    <form th:action="@{/admin/items/new}" method="post" class="form-card">
        <!-- El input escondido permite la gestión de la seguridad -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <label>Nombre :</label>
        <input type="text" name="name" class="input" required>

        <label>Descripción :</label>
        <textarea name="description" class="input"></textarea>

        <button type="submit" class="btn btn-primary" style="margin-top:15px;">
            Crear
        </button>
    </form>

    <div style="margin-top:20px;">
        <a th:href="@{/items}" class="btn btn-secondary">← Volver</a>
    </div>

</div>
</body>
</html>
