<!DOCTYPE html>
<html lang="es"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<body>
<main layout:fragment="content">
    <span id="pageTitleSetter"
          style="display:none;"
          th:with="pageName='Modificación de items'"></span>


    <h2 th:text="'Modificar el item #' + ${item.id}"></h2>

    <form class="form-card" method="post"
          th:action="@{'/items/edit/' + ${item.id}}"
          th:object="${item}">

        <!-- El'iD es necesario para la modificación -->
        <input th:field="*{id}" type="hidden"/>

        <label>Nombre :</label>
        <input class="input" required th:field="*{name}" type="text">

        <label>Descripción :</label>
        <textarea class="input" th:field="*{description}"></textarea>

        <button class="btn btn-warning" style="margin-top:15px;" type="submit">
            Actualizar
        </button>
    </form>


    <div style="margin-top:20px;">
        <a class="btn btn-secondary" th:href="@{/items}">← Volver</a>
    </div>

</main>
</body>
</html>
