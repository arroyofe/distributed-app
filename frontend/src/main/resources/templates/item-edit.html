<!DOCTYPE html>
<html lang="es"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Modificación de items</title>
</head>
<body>
<main layout:fragment="content">
    <span id="pageTitleSetter"
          style="display:none;"
          th:with="pageName='Modificación de items'"></span>


    <h2 id="form-title" th:text="'Modificar el item #' + ${item.id}">Modificar</h2>

    <form class="form-card" method="post"
          th:action="@{'/items/edit/' + ${item.id}}"
          th:object="${item}"
          aria-labelledby="form-title">

        <!-- El'iD es necesario para la modificación  thymeleaf le génère mais
        sonar demande de l'inclure aussi dans input. Thymeleaf usará su referencia-->
        <input th:field="*{id}" type="hidden"/>

        <label for="name">Nombre :</label>
        <input class="input" id="name" name="name" required th:field="*{name}" type="text" aria-required="true"/>


        <label for="description">Descripción :</label>
        <textarea class="input" id="description" name="description" th:field="*{description}" rows="4" ></textarea>


        <button class="btn btn-warning" style="margin-top:15px;" type="submit">Actualizar</button>
    </form>


    <div style="margin-top:20px;">
        <a class="btn btn-secondary" th:href="@{/items}">← Volver</a>
    </div>

</main>
</body>
</html>
