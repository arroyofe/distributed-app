<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout">
<body>

<div th:fragment="content">
    <!-- Título de la página que se verá en el header -->
    <span th:with="pageName='Admin-users-new'"></span>

    <h1>Crear nuevo usuario</h1>

    <form action="/admin/users/save" method="post">

        <div class="form-group">
            <label>Nombre del usuario</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="form-group mt-2">
            <label>Email</label>
            <input type="email" name="email" class="form-control">
        </div>

        <div class="form-group mt-2">
            <label>Contraseña</label>
            <input type="password" name="passwordHash" class="form-control" required>
        </div>

        <div class="form-group mt-2">
            <label>Rol</label>
            <select name="role" class="form-control">
                <option value="ADMIN">ADMIN</option>
                <option value="DEV">DEV</option>
                <option value="USER">USER</option>
            </select>
        </div>

        <button class="btn btn-success mt-3">Créer</button>
    </form>

</div>

</body>
</html>
