<!DOCTYPE html>
<html lang="es" xml:lang="es"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Creación de un usuario de la web</title>
</head>
<body>
<main layout:fragment="content">
    <span id="pageTitleSetter"
          style="display:none;"
          th:with="pageName='Nuevo usuario'"></span>

    <h2 id="form-title">Crear un nuevo usuario</h2>

    <form class="form-card" method="post"
          th:action="@{/users/new}"
          aria-labelledby="form-title">

        <label for="username">Nombre de usuario :</label>
        <input class="input" id="username" name="username" required type="text">

        <label for="email">email :</label>
        <input class="input" id="email" name="email" required type="text">

        <label for="password">Contraseña :</label>
        <input class="input" id="password" name="password" required type="password">

        <label for="role">Rol :</label>
        <select class="input" id="role" name="role">
            <option value="ROLE_ADMIN">ADMIN</option>
            <option value="ROLE_USER">USER</option>
            <option value="ROLE_DEV">DEV</option>
        </select>

        <button class="btn btn-primary" style="margin-top:15px;" type="submit">
            Crear
        </button>
    </form>

    <div style="margin-top:20px;">
        <a class="btn btn-secondary" th:href="@{/users}">← Volver</a>
    </div>

</main>
</body>
</html>
