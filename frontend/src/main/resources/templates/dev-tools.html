<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<main layout:fragment="content">
    <span id="pageTitleSetter"
          th:with="pageName='Herramientas para DEV'"
          style="display:none;"></span>


    <h2>Herramientas de desarrollo</h2>

    <div class="card mt-4">
        <div class="card-body">
            <h4>Base de datos MySQL</h4>

            <p>
                <strong>Estado :</strong>
                <span th:text="${dbUp} ? '🟢 En línea' : '🔴 Fuera de línea'"></span>
            </p>

            <p>
                <strong>Versión :</strong>
                <span th:text="${dbVersion}"></span>
            </p>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/dev/dashboard}" class="btn btn-secondary">← Volver al Dashboard</a>
    </div>

</main>
</body>
</html>
