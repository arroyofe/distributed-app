<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<main layout:fragment="content">
    <span id="pageTitleSetter"
          th:with="pageName='Inicio'"
          style="display:none;"></span>


    <h2 style="color:#003366;">Bienvenido a Sistemas Distribuidos de la EPI de la UBU</h2>

    <p style="font-size:18px; color:#444;">
        Pinche en el enlace siguiente para continuar :
    </p>

    <!-- Acceso al indice general -->
    <div style="margin-top:30px;">
        <a class="btn btn-primary"
           style="font-size:18px; padding:12px 20px;"
           th:href="@{/index}">
            📦 Ver la lista de opciones
        </a>
    </div>

</main>
</body>
</html>
