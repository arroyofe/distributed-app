<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<div th:replace="~{this :: #pageTitleSetter}"></div>
<span id="pageTitleSetter" th:with="pageName='Inicial'" style="display:none;"></span>
<div layout:fragment="content" class="home-container" style="text-align:center; margin-top:40px;">

    <h2 style="color:#003366;">Bienvenido a Sistemas Distribuidos de la EPI de la UBU</h2>

    <p style="font-size:18px; color:#444;">
        Pinche en el enlace siguiente para continuar :
    </p>

    <!-- Acceso al indice general -->
    <div style="margin-top:30px;">
        <a class="btn btn-primary"
           style="font-size:18px; padding:12px 20px;"
           th:href="@{/index}">
            📦 Ver la lista de opciones
        </a>
    </div>

</div>
</body>
</html>
