<!DOCTYPE html>
<html lang="es"
      layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat de la web</title>
    <th:block th:with="pageTitle='UBU - Sala de Chat Activa'"></th:block>
    <!-- Eliminamos el bloque <style> ya que sus propiedades críticas (height, overflow)
         están gestionadas correctamente en tu archivo style.css -->
    <style>
        .msg { margin-bottom: 8px; }
        .pending { color: #fd7e14; font-weight: bold; } /* Naranja Bootstrap */
        .private { color: #0d6efd; font-weight: bold; } /* Azul Bootstrap */
        .broadcast { color: #198754; font-weight: bold; } /* Verde Bootstrap */
    </style>
</head>
<body>

<main layout:fragment="content">
    <!-- Forzamos la actualización de las migas de pan (Breadcrumb) -->
    <div th:with="pageName='Chat Activo'" th:remove="all"></div>

    <div class="container-fluid px-4 py-2">
        <h2 class="fw-bold mb-4" style="color:#003366;">Sala de Chat WebSocket</h2>

        <div class="row">
            <!-- COLUMNA IZQUIERDA: MENSAJES Y PANELES -->
            <div class="col-12 col-lg-8 mb-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white border-0 pt-3">
                        <h5 class="fw-bold m-0 text-secondary">💬 Historial de Mensajes</h5>
                    </div>
                    <div class="card-body">
                        <!-- Usamos el ID de tu style.css que ya tiene overflow-y: auto -->
                        <div id="messages" class="bg-light rounded p-3" style="height: 350px;"></div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: USUARIOS CONECTADOS -->
            <div class="col-12 col-lg-4 mb-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white border-0 pt-3">
                        <h5 class="fw-bold m-0 text-secondary">👥 Usuarios Conectados</h5>
                    </div>
                    <div class="card-body">
                        <!-- Usamos el ID de tu style.css que ya maneja max-height -->
                        <ul id="connected-users" class="list-group list-group-flush bg-light rounded p-2"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECCIÓN DE ACCIONES / ENVÍO DE MENSAJES -->
        <div class="row">
            <!-- Formulario Broadcast -->
            <div class="col-12 col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100 p-4">
                    <h5 class="fw-bold text-success mb-3">📢 Enviar Mensaje Global (Broadcast)</h5>
                    <div class="mb-2">
                        <input id="broadcast-subject" class="my-input form-control" placeholder="Asunto del mensaje">
                    </div>
                    <div class="mb-3">
                        <input id="broadcast-body" class="my-input form-control" placeholder="Escribe tu mensaje aquí...">
                    </div>
                    <button onclick="sendBroadcastFromForm()" class="my-btn my-btn-primary btn fw-bold w-100" style="background-color: #198754; border:none;">
                        Enviar a todos
                    </button>
                </div>
            </div>

            <!-- Formulario Privado -->
            <div class="col-12 col-md-6 mb-4">
                <div class="card shadow-sm border-0 h-100 p-4">
                    <h5 class="fw-bold text-primary mb-3">🔒 Enviar Mensaje Privado</h5>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <input id="private-to" class="my-input form-control" placeholder="Usuario destino">
                        </div>
                        <div class="col-6">
                            <input id="private-subject" class="my-input form-control" placeholder="Asunto">
                        </div>
                    </div>
                    <div class="mb-3">
                        <input id="private-body" class="my-input form-control" placeholder="Escribe tu mensaje privado aquí...">
                    </div>
                    <button onclick="sendPrivateFromForm()" class="my-btn my-btn-primary btn fw-bold w-100" style="background-color: #003366; border:none;">
                        Enviar privado
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Carga de scripts asíncronos y arranque STOMP -->
    <script th:src="@{/js/stomp.min.js}"></script>
    <script th:src="@{/js/chat.js}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                if (typeof Stomp !== "undefined") {
                    console.log("Librería STOMP cargada correctamente");
                    if (typeof connect === "function") connect();
                } else {
                    console.error("ERROR: La librería STOMP no se pudo cargar. Revisa tu conexión o el bloqueo del navegador.");
                }
            }, 200);
        });
    </script>
</main>

</body>
</html>
