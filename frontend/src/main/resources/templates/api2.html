<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>API2</title>
  <meta charset="utf-8">

</head>
<body>
<main layout:fragment="content">
  <span id="pageTitleSetter"
        th:with="pageName='API2'"
        style="display:none;"></span>

  <h1>Respuesta de Py2 via Backend</h1>

<div th:if="${result}">

  <p><strong>Brut :</strong></p>
  <pre th:text="${result}"></pre>

  <p><strong>Message :</strong> <span th:text="${result['message']}"></span></p>
</div>

<div th:if="${error}">
  <strong>Erreur :</strong>
  <pre th:text="${error}"></pre>
</div>
</main>
</body>
</html>
