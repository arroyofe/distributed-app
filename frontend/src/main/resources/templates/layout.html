<!DOCTYPE html>
<html lang="es"
           xmlns:th="http://www.thymeleaf.org"
           xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
           xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
           th:with="ignoreSec=false">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title th:text="${pageTitle} ?: 'UBU - EPI - Sistemas Distribuidos'"></title>
</head>

<body>

<header class="header">
  <!-- Contenido del header: escudo de la UBU a la izquierda-->
  <div class="header-left">
    <img th:src="@{/images/escudo.png}" alt="Logo UBU" class="logo">
  </div>
  <!-- Título en el centro -->
  <div class="header-center">
    <h1 class="site-title">Práctica 2 de Sistemas Distribuidos EPI - UBU</h1>
  </div>
  <!-- Nombre de la página a la derecha  y del usuario si está conectado-->
  <div class="header-right">
    <!-- 1. Página actual (se ve siempre) -->
    <div style="margin-bottom: 5px;">
      <span th:text="${pageName} ?: ''" style="font-weight: bold;"></span>
    </div>

    <!-- 2. Bloque usuario (solo si está conectado) -->
    <div sec:authorize="isAuthenticated()"
         style="font-size: 0.85em; border-top: 1px solid #ccc; padding-top: 5px; text-align:right;">

      <!-- Nombre del usuario -->
      <div>
        👤 <strong sec:authentication="name"></strong>
      </div>

      <!-- Rol -->
      <div>
        <small>Rol :
          <span th:text="${#strings.replace(#authentication.authorities[0], 'ROLE_', '')}"></span>
        </small>
      </div>

      <!-- Botón logout compacto -->
      <div style="margin-top:4px;">
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <button type="submit" title="Desconexión"
                  style="background:none;border:none;font-size:18px;color:#ffcccc;cursor:pointer;">
            🔒
          </button>
        </form>
      </div>

    </div>

    <!-- 3. Enlace de conexión si no se ha conectado nadie -->
    <div sec:authorize="isAnonymous()">
      <a th:href="@{/login}" style="font-size: 0.9em;color:white">Conectarse</a>
    </div>
  </div>


</header>

<!-- Zona destinada ser cambiada en cada página según contenido -->
<main class="content" layout:fragment="content">
  <!-- NO SE INSERTA más cádigo aquí, reservado al contenido de la página -->

</main>

<footer class="footer">
  <!-- Contenido del footer a poner en todas las páginas -->
  <div class="footer-left">
    <strong>Contacto :</strong><br>
    <span>Fernando Arroyo</span><br>
    <span>far0006@alu.ubu.es</span><br>
    <span>Universidad de Burgos</span>
  </div>

  <div class="footer-center">
    <span th:text="${#dates.format(#dates.createNow(),'dd/MM/yyyy')}"></span>
  </div>

  <div class="footer-right">
    <a th:href="@{/}">Volver al inicio</a>
  </div>

</footer>

</body>
</html>
