<!DOCTYPE html>
<html lang="es" xml:lang="es"
      th:with="ignoreSec=false"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos Bootstrap (icono flecha) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS personnalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <title th:text="${pageTitle} ?: 'UBU - EPI - Sistemas Distribuidos'"></title>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- ===== HEADER ===== -->
<header class="py-3 shadow-sm" style="background:#003366; color:white;">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <!-- Logo + vuelta atrás -->
        <div class="d-flex align-items-center">
            <img alt="Logo UBU" class="logo me-3" th:src="@{/images/escudo.png}">
            <button class="btn btn-outline-light btn-sm" onclick="window.history.back()">
                <i class="bi bi-arrow-left"></i> Volver atrás
            </button>
        </div>

        <!-- Título -->
        <div class="text-center flex-grow-1">
            <h1 class="h4 fw-bold m-0">Práctica 2 de Sistemas Distribuidos EPI - UBU</h1>
        </div>

        <!-- Zona usuario -->
        <div class="text-end small">

            <div sec:authorize="isAuthenticated()">
                <div>👤 <strong sec:authentication="name"></strong></div>
                <div>Rol :
                    <span th:text="${#strings.replace(#authentication.authorities[0], 'ROLE_', '')}"></span>
                </div>
                <form class="d-inline" method="post" th:action="@{/logout}">
                    <button class="btn btn-link text-danger p-0 fs-5" aria-label="Cerrar sesión">🔒</button>
                </form>
            </div>

            <div sec:authorize="isAnonymous()">
                <a class="text-white" th:href="@{/login}">Conectarse</a>
            </div>

        </div>

    </div>
</header>

<!-- ===== BREADCRUMB ===== -->
<nav aria-label="breadcrumb" class="bg-light p-2 mb-4 shadow-sm rounded">
    <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a th:href="@{/}">🏠 Inicio</a></li>
        <li aria-current="page" class="breadcrumb-item active"
            th:text="${pageName ?: ''}">
            Nom de la page
        </li>
    </ol>
</nav>

<!-- ===== CONTENIDO ===== -->
<main class="content container" layout:fragment="content">
    <!-- Contenido específico de cada página -->
</main>

<!-- ===== FOOTER ===== -->
<footer class="mt-auto">
    <div class="container-fluid d-flex justify-content-between align-items-center small">

        <div>
            <strong>Contacto :</strong><br>
            Fernando Arroyo<br>
            far0006@alu.ubu.es<br>
            Universidad de Burgos
        </div>

        <div class="text-center">
            <span th:text="${#dates.format(#dates.createNow(),'dd/MM/yyyy')}"></span>
        </div>

    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
