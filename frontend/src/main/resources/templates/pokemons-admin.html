<!DOCTYPE html>
<html lang="es" layout:decorate="~{layout}"
      xmlns:layout="http://ultraq.net.nz"
      xmlns:th="http://thymeleaf.org">
<body>
<main layout:fragment="content">
    <h2>Gestion de la Base Pokémon</h2>

    <!-- Formulario de inserción -->
    <div class="card mb-4 p-3">
        <form class="row g-3" method="post" th:action="@{/pokemons/new}">
            <div class="col-md-4">
                <input class="form-control" name="name" placeholder="Nom (ex: Salameche)" required type="text">
            </div>
            <div class="col-md-3">
                <input class="form-control" name="type" placeholder="Type" required type="text">
            </div>
            <div class="col-md-2">
                <input class="form-control" name="level" placeholder="Niveau" type="number" value="1">
            </div>
            <div class="col-md-3">
                <button class="btn btn-warning w-100" type="submit">Añadir a la base</button>
            </div>
        </form>
    </div>

    <!-- Table simple de visualisation -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Nivel</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pokemons}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.type}"></td>
            <td th:text="${p.level}"></td>
            <td>
                <!-- Botón Modificar (Enlace al formulario) -->
                <a class="btn btn-warning btn-sm" th:href="@{'/pokemons/edit/' + ${p.id}}">
                    <i class="bi bi-pencil">Modificar</i>
                </a>

                <!-- Botón Suprimir -->
                <form method="post" style="display:inline;" th:action="@{'/pokemons/delete/' + ${p.id}}">
                    <button class="btn btn-danger btn-sm" onclick="return confirm('Suprimir ?')" type="submit">
                        <i class="bi bi-trash">Suprimir</i>
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
