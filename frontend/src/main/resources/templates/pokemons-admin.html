<!DOCTYPE html>
<html lang="es" layout:decorate="~{layout}"
      xmlns:layout="http://ultraq.net.nz"
      xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Gestión de Pokemones</title>
</head>
<body>
<main layout:fragment="content">
    <h2 class="mb-4">Gestión de la Base Pokémon</h2>

    <!-- Formulario para añadir Pokémones -->
    <div class="card mb-4 p-3 shadow-sm">
        <form class="row g-3" method="post" th:action="@{/pokemons/new}">
            <div class="col-md-4">
                <input class="form-control" name="name" placeholder="Nombre (ex: Salameche)" required type="text">
            </div>
            <div class="col-md-3">
                <input class="form-control" name="type" placeholder="Tipo" required type="text">
            </div>
            <div class="col-md-2">
                <input class="form-control" name="level" placeholder="Nivel" type="number" value="1">
            </div>
            <div class="col-md-3">
                <button class="btn btn-warning w-100" type="submit">Añadir el Pokémon</button>
            </div>
        </form>
    </div>

    <!-- Tabla de gestión -->
    <table class="table table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Nombre</th>
            <th scope="col">Tipo</th>
            <th scope="col">Nivel</th>
            <th class="text-center" scope="col">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${pokemons}">
            <td th th:scope="row" th:text="${p.id}"></td>

            <!-- Formulario de modificación -->
            <form class="contents"
                  method="post"
                  th:action="@{/pokemons/edit/{id}(id=${p.id})}">

                <td>
                    <label class="visually-hidden" for="name" th:for="'name-' + ${p.id}">Nombre</label>
                    <input class="form-control form-control-sm" id="name"
                           name="name"
                           required
                           th:id="'name-' + ${p.id}"
                           th:value="${p.name}">
                </td>

                <td>
                    <label class="visually-hidden" for="type" th:for="'type-' + ${p.id}">Tipo</label>
                    <input class="form-control form-control-sm" id="type"
                           name="type"
                           required
                           th:id="'type-' + ${p.id}"
                           th:value="${p.type}">
                </td>

                <td>
                    <label class="visually-hidden" for="level" th:for="'level-' + ${p.id}">Nivel</label>
                    <input class="form-control form-control-sm" id="level"
                           min="1"
                           name="level"
                           th:id="'level-' + ${p.id}"
                           th:value="${p.level}"
                           type="number">
                </td>

                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">

                        <!-- Botón Modificar -->
                        <button aria-label="Modificar Pokémon"
                                class="btn btn-success btn-sm"
                                type="submit">
                            <i class="bi bi-pencil-square"></i>
                        </button>

                        <!-- Botón Suprimir (abre la modal de supresión -->
                        <button aria-label="Suprimir Pokémon"
                                class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#deleteModal-' + ${p.id}"
                                type="button">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>
            </form>

            <!-- Modal de supresión -->
            <div aria-hidden="true"
                 class="modal fade"
                 tabindex="-1"
                 th:id="'deleteModal-' + ${p.id}">

                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Confirmar eliminación</h5>
                            <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                        </div>

                        <div class="modal-body">
                            ¿Seguro que quieres eliminar el Pokémon
                            <strong th:text="${p.name}"></strong>?
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary"
                                    data-bs-dismiss="modal"
                                    type="button">
                                Cancelar
                            </button>

                            <form method="post"
                                  th:action="@{/pokemons/delete/{id}(id=${p.id})}">
                                <button class="btn btn-danger" type="submit">
                                    Suprimir
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>

        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
