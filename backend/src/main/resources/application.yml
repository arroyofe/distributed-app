spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/appdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    thymeleaf:
      check-template-location: false # Evita la busca de templates en backend están en frontend

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc.time_zone: UTC


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Sirve para considerar que los ficheros presentes son el punto de partida
    validate-on-migrate: true # chequea las diferencias de checksums para ver si se añaden ficheros a la base
    repair-on-migrate: false # provisional para limpiar la base

server:
  port: ${SERVER_PORT:8080}

app:
  py2BaseUrl: ${PY2_BASE_URL:http://py2:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info